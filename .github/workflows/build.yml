name: Build & Release

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Generate version
        id: version
        run: |
          VER="v$(date +%Y.%m.%d.%H%M)"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Generated version: $VER"

      - name: Update versions
        run: |
          VER="${{ steps.version.outputs.version }}"
          # Update pom.xml version
          sed -i "s|<version>1.0.0</version>|<version>${VER#v}</version>|" pom.xml
          # Update plugin.yml version
          sed -i "s|^version: '.*'|version: '${VER#v}'|" src/main/resources/plugin.yml

      - name: Build with Maven (with retry)
        run: |
          for i in 1 2 3; do
            echo "=== Build attempt $i ==="
            mvn clean package --batch-mode -Dmaven.wagon.http.retryHandler.count=5
            if [ $? -eq 0 ]; then
              echo "=== Build succeeded on attempt $i ==="
              break
            fi
            if [ $i -lt 3 ]; then
              echo "=== Build failed, waiting 15s before retry... ==="
              sleep 15
            else
              echo "=== All 3 attempts failed ==="
              exit 1
            fi
          done

      - name: List artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -lh target/*.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## 3d3kOptimization ${{ steps.version.outputs.version }}

            自动构建发布 — 由 GitHub Actions 自动编译。

            ### 安装方法
            1. 下载 `3d3kOptimization-*.jar`
            2. 放入 `plugins/` 目录
            3. 重启服务器或执行 `/reload confirm`
          files: target/*.jar
          generate_release_notes: false
          fail_on_unmatched: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
