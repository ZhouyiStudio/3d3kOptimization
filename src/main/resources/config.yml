# 3d3kOptimization 配置文件
# Purpur 1.21.1 服务器性能优化

# ─── 通用设置 ───
settings:
  # 是否启用调试日志
  debug: false
  # 配置自动保存间隔（分钟）
  auto-save-interval: 10
  # 更新检查
  check-update: true

# ─── 实体优化 ───
entity:
  # 是否启用实体优化
  enabled: true
  # 实体激活范围（方块）
  activation-range:
    monster: 32
    animal: 48
    water: 16
    flying: 48
    villager: 48
  # 掉落物合并间隔（tick）
  item-merge-interval: 20
  # 掉落物最大存活时间（秒），-1 为不限制
  item-despawn-time:
    default: 300
    valuable: 600
    # 有价值的物品（不合并/延长存活）
    valuable-items:
      - DIAMOND
      - NETHERITE_SCRAP
      - NETHERITE_INGOT
      - ELYTRA
      - SHULKER_SHELL
  # 经验球合并距离（方块）
  xp-merge-radius: 8
  # 是否禁用盔甲架
  disable-armor-stands: false
  # 是否禁用画
  disable-paintings: false

# ─── 红石优化 ───
redstone:
  # 是否启用红石优化
  enabled: true
  # 是否禁用高频红石检测（每 tick 激活次数超过此值时阻止）
  limit-high-frequency: true
  # 高频阈值（每 tick 激活次数）
  high-frequency-threshold: 15
  # 高频惩罚 tick（阻止后续激活的 tick 数）
  high-frequency-penalty: 4
  # 是否禁用活塞
  disable-pistons: false

# ─── 区块优化 ───
chunk:
  # 是否启用区块优化
  enabled: true
  # 玩家视距（区块）
  view-distance: 8
  # 实体视距（区块）
  entity-view-distance: 4
  # 区块卸载延迟（秒）
  unload-delay: 15
  # 每 tick 最大卸载区块数
  max-unloads-per-tick: 20

# ─── 生物限制 ───
mob-limiter:
  # 是否启用生物限制
  enabled: true
  # 每个区块最大生物数（-1 为不限制）
  max-mobs-per-chunk: 25
  # 每种生物每区块上限
  per-type:
    CREEPER: 8
    ZOMBIE: 15
    SKELETON: 10
    SPIDER: 8
    ENDERMAN: 4
    WITCH: 3
    PHANTOM: 3
  # 全局实体上限
  global:
    monsters: 200
    animals: 100
    water: 40
    flying: 60
  # 刷怪抑制 - 当玩家附近的实体数超过此值时停止刷怪
  spawn-suppress-threshold: 40

# ─── 漏斗优化 ───
hopper:
  # 是否启用漏斗优化
  enabled: true
  # 漏斗冷却 tick（增加此值可减少漏斗检查频率，降低卡顿）
  cooldown: 2
  # 每 tick 最大处理的漏斗数（分散负载，避免卡顿）
  max-per-tick: 20

# ─── TNT 优化 ───
tnt:
  # 是否启用 TNT 优化
  enabled: true
  # 同一位置最大连续 TNT 爆炸数（超过此值触发限制）
  chain-limit-per-location: 3
  # 是否取消过量的链式爆炸
  cancel-excessive-chain: true
  # TNT 爆炸半径（0=使用默认值）
  explosion-radius: 0
  # TNT 最大破坏方块数（0=不限制）
  max-block-break: 0
  # TNT 威力（-1=使用默认值）
  yield: -1

# ─── AI 优化 ───
ai:
  # 是否启用 AI 优化
  enabled: true
  # AI 冻结范围（方块）- 超出此范围的实体冰冻 AI
  freeze-range: 48

# ─── 性能监控 ───
monitoring:
  # 是否启用性能监控
  enabled: true
  # 监控间隔（tick）
  interval: 12000
  # TPS 告警阈值（低于此值时发送告警）
  tps-alert-threshold: 16.0
  # 是否在控制台打印性能报告
  print-to-console: true
  # 性能报告广播权限
  broadcast-permission: 3d3k.status

# ─── 杂项优化 ───
misc:
  # 是否禁用村民交易闪烁
  disable-villager-trade-glitch: true
  # 是否禁用藤蔓生长
  disable-vine-growth: false
  # 是否禁用树叶腐烂
  disable-leaf-decay: false
  # 是否禁用天气
  disable-weather: false
  # 是否禁用雷击
  disable-lightning: false
  # 经验球合并
  merge-xp: true

# ─── 村民优化 ───
villager:
  # 是否启用村民优化
  enabled: true
  # 跳过村民交易的几率（0-1）
  gossip-skip-chance: 0.3
  # 村民冻结 AI 范围（方块）
  freeze-range: 32
  # 是否限制村民交易对话
  limit-gossip: true
  # 是否禁用村民繁殖
  disable-breeding: false
  # 是否限制 AI 任务
  limit-ai-tasks: true

# ─── 碰撞优化 ───
collision:
  # 是否启用碰撞优化
  enabled: true
  # 碰撞检查间隔（tick）
  check-interval: 5
  # 是否限制每区块碰撞检测
  limit-per-chunk: true
  # 每区块最大实体数
  max-entities-per-chunk: 24
  # 是否自动调整碰撞检测范围
  auto-scale: true
  # TPS 阈值（低于此值自动缩减碰撞检测）
  tps-threshold: 17.0

# ─── 玩家优化 ───
player:
  # 是否启用玩家优化
  enabled: true
  # 自动 AFK
  auto-afk:
    # 是否启用 AFK 检测
    enabled: true
    # AFK 超时时间（秒）
    timeout: 300
    # 超时后是否踢出玩家（false 仅警告）
    kick: true
    # 踢出前是否警告
    warn-before-kick: true
    # 踢出前提前警告时间（秒）
    warn-seconds: 30
  # 动态视距
  dynamic-view-distance:
    # 是否启用动态视距
    enabled: true
    # 视距最小值（区块）
    min-view-distance: 4
    # TPS 阈值（低于此值缩减视距）
    tps-threshold: 17.0
  # 交互节流
  action-throttle:
    # 是否启用交互节流
    enabled: true
    # 容器打开最小间隔（tick）
    container-open-interval: 10
    # 命令执行最小间隔（tick）
    command-interval: 2

# ─── 光照优化 ───
light:
  # 是否启用光照优化
  enabled: true
  # 是否限制光照更新频率
  throttle-updates: true
  # 光照更新队列最大长度
  max-queue-size: 500
  # 光照卸载范围（区块）
  unload-range: 12

# ─── 异常检测 ───
detection:
  # 是否启用异常检测
  enabled: true
  # 检测间隔（tick）
  check-interval: 100

  # 掉落物堆积检测 - 同一位置大量掉落物堆积导致卡顿
  item-pile:
    # 是否启用
    enabled: true
    # 同一区块内最大掉落物数（超过此值触发告警）
    max-per-chunk: 100
    # 告警冷却时间（秒）
    alert-cooldown: 60

  # 实体密集区域检测 - 实体过于集中的区块
  entity-density:
    # 是否启用
    enabled: true
    # 高密度阈值（每区块实体数）
    dense-threshold: 35
    # 告警冷却时间（秒）
    alert-cooldown: 120

  # 区块负载检测 - 高负载区块（实体多、红石活跃）
  chunk-load:
    # 是否启用
    enabled: true
    # 高负载实体数阈值
    entity-threshold: 50
    # 高负载红石更新数阈值（每秒）
    redstone-threshold: 80

  # 实体生成风暴检测 - 短时间内大量实体生成
  spawn-storm:
    # 是否启用
    enabled: true
    # 每秒最大实体生成数（超过此值视为异常）
    max-rate: 40
    # 采样窗口（tick）
    sample-window: 100

  # 玩家行为检测 - 检测可能导致卡顿的玩家行为
  player-behavior:
    # 是否启用
    enabled: true
    # 每秒最大命令执行数
    max-commands-per-second: 10
    # 是否检测高频交互（如快速点击）
    detect-high-frequency-interaction: true
